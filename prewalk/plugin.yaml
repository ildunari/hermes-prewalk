name: prewalk
version: "1.2.1"
description: >
  CLI-only one-shot Prewalk for Hermes Agent. A frontier planner explores the
  codebase, creates a capped todo with validation checkpoints, and lands one
  successful edit. Request middleware then removes the planning instruction and
  gives the same trajectory to a faster executor on the very next model call.
author: ildunari
provides_hooks:
  - pre_tool_call
  - post_tool_call
  - pre_verify
  - post_llm_call
  - on_session_end
  - on_session_reset
  - on_session_finalize
